name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Syntax check
        run: |
          node --check server.js
          node --check app.js

      - name: Health smoke test
        run: |
          node server.js &
          sleep 2
          curl --fail http://127.0.0.1:4173/healthz
