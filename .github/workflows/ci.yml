name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: npm run check

      - name: Health smoke test
        run: |
          set -euo pipefail
          node server.js > server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT

          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:4173/healthz > /dev/null; then
              echo "healthz ok"
              exit 0
            fi
            sleep 0.5
          done

          echo "healthz did not respond in time"
          cat server.log
          exit 1
